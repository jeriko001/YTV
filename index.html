  <style>
    * { box-sizing: border-box; }
    body {
      background-color: #141414;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      min-height: 100vh;
    }

    /* GRID responsive */
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 480px)  { .channel-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 768px)  { .channel-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1024px) { .channel-grid { grid-template-columns: repeat(5, 1fr); } }
    @media (min-width: 1280px) { .channel-grid { grid-template-columns: repeat(6, 1fr); } }
    @media (min-width: 1600px) { .channel-grid { grid-template-columns: repeat(7, 1fr); } }

    /* CARD */
    .channel-card {
      background: #252525;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.2s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }
    .channel-card:hover {
      transform: scale(1.06) translateY(-3px);
      box-shadow: 0 8px 40px rgba(229,9,20,0.28);
      background: #2e2e2e;
      z-index: 10;
    }
    .channel-card:active { transform: scale(0.98); }

    /* IMAGE WRAPPER — aspect ratio quadrato */
    .card-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #1a1a1a;
      overflow: hidden;
      position: relative;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .channel-card:hover .card-img-wrap img { transform: scale(1.08); }

    /* LIVE BADGE */
    .live-badge {
      position: absolute;
      top: 7px;
      left: 7px;
      background: #e50914;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 4px;
      animation: pulse-badge 1.6s ease-in-out infinite;
      text-transform: uppercase;
    }
    @keyframes pulse-badge {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(229,9,20,0.6); }
      50% { opacity: 0.85; box-shadow: 0 0 0 5px rgba(229,9,20,0); }
    }

    /* CARD FOOTER */
    .card-footer {
      padding: 8px 10px 10px;
    }
    .card-name {
      font-size: 12px;
      font-weight: 500;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }
    .card-tag {
      font-size: 9px;
      background: #333;
      color: #aaa;
      padding: 2px 5px;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* SEARCH BAR */
    .search-wrap {
      position: relative;
    }
    #searchInput {
      width: 100%;
      background: #2a2a2a;
      border: 1.5px solid #3a3a3a;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 16px 12px 44px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    #searchInput:focus { border-color: #e50914; background: #2f2f2f; }
    #searchInput::placeholder { color: #666; }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      pointer-events: none;
    }
    #clearBtn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: #444;
      border: none;
      color: #ccc;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
    }
    #clearBtn.visible { display: flex; }

    /* FILTER PILLS */
    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid #3a3a3a;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .pill:hover { border-color: #e50914; color: #fff; }
    .pill.active { background: #e50914; border-color: #e50914; color: #fff; }

    /* HEADER */
    .site-header {
      background: linear-gradient(180deg, #0a0a0a 0%, #141414 100%);
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* LOGO */
    .logo-img { height: 36px; width: auto; }

    /* COUNT BADGE */
    #countBadge {
      font-size: 12px;
      color: #777;
      white-space: nowrap;
    }

    /* NO RESULTS */
    #noResults {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }
    #noResults svg { margin: 0 auto 16px; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #141414; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* FOOTER */
    footer { border-top: 1px solid #222; }

    /* Shimmer placeholder for missing images */
    .img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 4vw, 32px);
      color: #555;
      letter-spacing: 0.05em;
    }
  </style>

  </header>

  // ─── CATEGORIES for pills (derived from topics) ──────────────────────────
  const PILL_CATEGORIES = [
    { label:"Tutti",        filter:null },
    { label:"⚽ Calcio",    filter:"calcio" },
    { label:"🏎 Motori",    filter:"motori" },
    { label:"🏀 Palla",    filter:"palla" },
    { label:"🎾 Racchetta", filter:"racchetta" },
    { label:"🥊 Lotta",     filter:"lotta" },
    { label:"🚴 Ciclismo",  filter:"ciclismo" },
    { label:"⛵ Nautica",   filter:"nautica" },
    { label:"✈ Volo",      filter:"volo" },
    { label:"🤸 Extreme",   filter:"extreme" },
    { label:"📺 Media",     filter:"media" },
  ];

  // ─── STATE ────────────────────────────────────────────────────────────────
  let activeFilter = null;
  let searchQuery  = "";

  // ─── ELEMENTS ─────────────────────────────────────────────────────────────
  const grid        = document.getElementById("channelGrid");
  const searchInput = document.getElementById("searchInput");
  const clearBtn    = document.getElementById("clearBtn");
  const noResults   = document.getElementById("noResults");
  const countBadge  = document.getElementById("countBadge");
  const pillsWrap   = document.getElementById("filterPills");

  // ─── BUILD PILLS ─────────────────────────────────────────────────────────
  PILL_CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "pill" + (cat.filter === null ? " active" : "");
    btn.textContent = cat.label;
    btn.dataset.filter = cat.filter ?? "";
    btn.addEventListener("click", () => {
      activeFilter = cat.filter;
      searchInput.value = "";
      searchQuery = "";
      clearBtn.classList.remove("visible");
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
    pillsWrap.appendChild(btn);
  });

  // ─── SEARCH ───────────────────────────────────────────────────────────────
  searchInput.addEventListener("input", () => {
    searchQuery = searchInput.value.trim().toLowerCase();
    clearBtn.classList.toggle("visible", searchQuery.length > 0);
    // reset pill highlight
    document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
    if (!searchQuery) {
      activeFilter = null;
      document.querySelector('.pill[data-filter=""]').classList.add("active");
    }
    render();
  });

  clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    searchQuery = "";
    clearBtn.classList.remove("visible");
    activeFilter = null;
    document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
    document.querySelector('.pill[data-filter=""]').classList.add("active");
    render();
  });

  // ─── FILTER LOGIC ────────────────────────────────────────────────────────
  function getFiltered() {
    return channels.filter(ch => {
      const matchesPill = !activeFilter || ch.topics.some(t => t === activeFilter);
      if (!searchQuery) return matchesPill;
      const q = searchQuery;
      const nameMatch  = ch.name.toLowerCase().includes(q);
      const topicMatch = ch.topics.some(t => t.toLowerCase().includes(q));
      return nameMatch || topicMatch;
    });
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  function render() {
    const filtered = getFiltered();
    countBadge.textContent = filtered.length + " canali";

    if (filtered.length === 0) {
      grid.innerHTML = "";
      noResults.style.display = "block";
      return;
    }
    noResults.style.display = "none";

    // Use DocumentFragment for performance
    const frag = document.createDocumentFragment();
    filtered.forEach(ch => {
      const card = document.createElement("div");
      card.className = "channel-card";
      card.title = ch.name;
      card.addEventListener("click", () => {
        // YouTube channel links redirect automatically if channel changes name
        // Using @ handle URLs which are canonical and redirect-safe
        window.open(ch.url, "_blank", "noopener,noreferrer");
      });

      const imgWrap = document.createElement("div");
      imgWrap.className = "card-img-wrap";

      const img = document.createElement("img");
      img.loading = "lazy";
      img.decoding = "async";
      img.alt = ch.name;
      img.src = "icone/" + ch.icon;
      img.onerror = function() {
        this.style.display = "none";
        const ph = document.createElement("div");
        ph.className = "img-placeholder";
        ph.textContent = ch.name.substring(0,3).toUpperCase();
        imgWrap.appendChild(ph);
      };

      const live = document.createElement("span");
      live.className = "live-badge";
      live.textContent = "LIVE";

      imgWrap.appendChild(img);
      imgWrap.appendChild(live);

      const footer = document.createElement("div");
      footer.className = "card-footer";

      const nameEl = document.createElement("div");
      nameEl.className = "card-name";
      nameEl.textContent = ch.name;

      const tagsEl = document.createElement("div");
      tagsEl.className = "card-tags";
      ch.topics.forEach(t => {
        const tag = document.createElement("span");
        tag.className = "card-tag";
        tag.textContent = t;
        tagsEl.appendChild(tag);
      });

      footer.appendChild(nameEl);
      footer.appendChild(tagsEl);
      card.appendChild(imgWrap);
      card.appendChild(footer);
      frag.appendChild(card);
    });

    grid.innerHTML = "";
    grid.appendChild(frag);
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────
  render();

  // ─── SERVICE WORKER ───────────────────────────────────────────────────────
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
